<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Advanced Config — Ghost Mail Bridge</title>
  <link rel="stylesheet" href="docs.css">
</head>
<body>
  <div class="docs-layout">
    <aside class="sidebar">
      <a class="sidebar-brand" href="../">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 17a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9.5C2 7 4 5 6.5 5H18c2.2 0 4 1.8 4 4v8Z"/><polyline points="15,9 18,9 18,11"/><path d="M6.5 5C9 5 11 7 11 9.5V17a2 2 0 0 1-2 2"/><line x1="6" x2="7" y1="10" y2="10"/></svg>
        Ghost Mail Bridge
      </a>
      <nav id="sidebar-nav"></nav>
    </aside>
    <main class="content" id="content"></main>
  </div>
  <script>
    window.__DOC_FILE__ = 'advanced-config.md';
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <script>
    var defined = typeof window.__DOC_FILE__ === 'string' ? window.__DOC_FILE__ : 'index.md';
    fetch(defined).then(function(r){return r.text()}).then(function(raw){
      var body = raw.replace(/^---[\s\S]*?---\s*/, '');
      document.getElementById('content').innerHTML = marked.parse(body);

      // build sidebar nav from h2 headings
      var headings = document.querySelectorAll('.content h2');
      var nav = document.getElementById('sidebar-nav');
      var html = '';
      headings.forEach(function(h){
        if (!h.id) h.id = h.textContent.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
        html += '<a href="#' + h.id + '">' + h.textContent + '</a>';
      });
      nav.innerHTML = html;
    });
  </script>
</body>
</html>
