services:
  ghost-mail-bridge:
    build: .
    # Or use a pre-built image:
    # image: ghcr.io/ifrederico/ghost-mail-bridge:latest
    ports:
      - "127.0.0.1:3003:3003"
    volumes:
      - ./data:/data
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - SQS_QUEUE_URL=${SQS_QUEUE_URL}
      - SES_CONFIGURATION_SET=${SES_CONFIGURATION_SET:-ghost-mail-bridge}
      - PROXY_API_KEY=${PROXY_API_KEY}
      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SEND_CONCURRENCY=${SEND_CONCURRENCY:-10}
      - SUPPRESSION_RETENTION_DAYS=${SUPPRESSION_RETENTION_DAYS:-0}
      - ADMIN_BASE_PATH=${ADMIN_BASE_PATH:-/ghost/email}
      # Dashboard auth (cookie session verification)
      - GHOST_ADMIN_URL=${GHOST_ADMIN_URL:-}
      - GHOST_ACCEPT_VERSION=${GHOST_ACCEPT_VERSION:-v6.0}
    restart: unless-stopped
